<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rate My Reviewer - Remote</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; max-width: 900px; }
    nav a { margin-right: 15px; cursor: pointer; }
    nav a.active { font-weight: bold; text-decoration: underline; }
    .page { display: none; margin-top: 20px; }
    .page.active { display: block; }
    label { display: block; margin-top: 10px; }
    select, input[type=text], textarea { margin-top: 3px; }
    textarea { width: 100%; height: 80px; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 6px; text-align: left; }
    th { cursor: pointer; background: #eee; }
    .review-item { border: 1px solid #ccc; padding: 8px; margin-top: 8px; }
    .rank-box { border: 1px solid #333; padding: 10px; margin-top: 10px; display: inline-block; }
    .error { color: red; }
    hr { margin: 20px 0; }
  </style>
</head>
<body>

<h1>Rate My Reviewer - Remote Edition</h1>

<nav>
  <a onclick="showPage('submit')" id="nav-submit" class="active">Submit Review</a>
  <a onclick="showPage('browse')" id="nav-browse">Browse Reviews</a>
  <a onclick="showPage('scores')" id="nav-scores">Conference Scores</a>
  <a onclick="showPage('detail')" id="nav-detail">Conference Detail</a>
</nav>

<!-- PAGE 1: SUBMIT REVIEW -->
<div id="page-submit" class="page active">
  <h2>Submit a Review of a Reviewer</h2>
  <form id="reviewForm">
    <label>Conference
      <select id="f-conference" required>
        <option value="">-- select --</option>
        <option>IEEE S&P</option>
        <option>USENIX Security</option>
        <option>CCS</option>
        <option>NDSS</option>
      </select>
    </label>

    <label>Year
      <select id="f-year" required></select>
    </label>

    <label>Paper ID
      <input type="text" id="f-paperid" required>
    </label>

    <label>1. What did the reviewer claim their confidence/expertise was?
      <select id="f-q1">
        <option value="1">1</option><option value="2">2</option>
        <option value="3">3</option><option value="4">4</option>
        <option value="5">5</option>
      </select>
    </label>

    <label>2. How would you rate the reviewer's confidence/expertise based on the review correctness?
      <select id="f-q2">
        <option value="1">1</option><option value="2">2</option>
        <option value="3">3</option><option value="4">4</option>
        <option value="5">5</option>
      </select>
    </label>

    <label>3. How would you rate the validity of the review?
      <select id="f-q3">
        <option value="1">1</option><option value="2">2</option>
        <option value="3">3</option><option value="4">4</option>
        <option value="5">5</option>
      </select>
    </label>

    <label>4. How would you rate the quality of the review?
      <select id="f-q4">
        <option value="1">1</option><option value="2">2</option>
        <option value="3">3</option><option value="4">4</option>
        <option value="5">5</option>
      </select>
    </label>

    <label>5. How would you rate the professionalism of the review?
      <select id="f-q5">
        <option value="1">1</option><option value="2">2</option>
        <option value="3">3</option><option value="4">4</option>
        <option value="5">5</option>
      </select>
    </label>

    <label>Comments
      <textarea id="f-comments"></textarea>
    </label>

    <p><button type="submit">Submit Review</button></p>
    <p id="submit-msg"></p>
  </form>
</div>

<!-- PAGE 2: BROWSE REVIEWS -->
<div id="page-browse" class="page">
  <h2>Browse Reviews</h2>
  <label>Conference
    <select id="b-conference"></select>
  </label>
  <label>Year
    <select id="b-year"></select>
  </label>
  <button onclick="renderBrowse()">Show Reviews</button>
  <div id="browse-results"></div>
</div>

<!-- PAGE 3: CONFERENCE SCORES -->
<div id="page-scores" class="page">
  <h2>Conference Scores</h2>
  <label>Year
    <select id="s-year" onchange="renderScores()"></select>
  </label>
  <table id="scores-table">
    <thead>
      <tr>
        <th onclick="sortScores('conference')">Conference</th>
        <th onclick="sortScores('q1')">Q1</th>
        <th onclick="sortScores('q2')">Q2</th>
        <th onclick="sortScores('q3')">Q3</th>
        <th onclick="sortScores('q4')">Q4</th>
        <th onclick="sortScores('q5')">Q5</th>
        <th onclick="sortScores('overall')">Overall</th>
        <th onclick="sortScores('count')">Reviews</th>
      </tr>
    </thead>
    <tbody id="scores-tbody"></tbody>
  </table>
</div>

<!-- PAGE 4: CONFERENCE DETAIL -->
<div id="page-detail" class="page">
  <h2>Conference Detail</h2>
  <label>Conference
    <select id="d-conference"></select>
  </label>
  <label>Year
    <select id="d-year"></select>
  </label>
  <button onclick="renderDetail()">Show Detail</button>
  <div id="detail-results"></div>
</div>

<script>
const CONFERENCES = ["IEEE S&P","USENIX Security", "CCS", "NDSS"];
const YEARS = [];
for (let y = 2026; y >= 2015; y--) YEARS.push(y);

let reviews = [];
let scoresSortKey = 'overall';
let scoresSortDir = -1;

// Supabase Configuration
const SUPABASE_URL = 'https://lutgpdcziwaqmbnvhkle.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_7s3blRpoTIVHAFFA1IHutA_S8NMuyY8';
const SUPABASE_TABLE = 'reviews';

function populateSelect(id, options, includeAll) {
  const sel = document.getElementById(id);
  sel.innerHTML = "";
  if (includeAll) {
    const opt = document.createElement("option");
    opt.value = "";
    opt.textContent = "-- all --";
    sel.appendChild(opt);
  }
  options.forEach(o => {
    const opt = document.createElement("option");
    opt.value = o;
    opt.textContent = o;
    sel.appendChild(opt);
  });
}

function initSelects() {
  populateSelect("f-year", YEARS, false);
  populateSelect("b-conference", CONFERENCES, true);
  populateSelect("b-year", YEARS, true);
  populateSelect("s-year", YEARS, false);
  populateSelect("d-conference", CONFERENCES, false);
  populateSelect("d-year", YEARS, false);
}

function showPage(name) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll("nav a").forEach(a => a.classList.remove("active"));
  document.getElementById("page-" + name).classList.add("active");
  document.getElementById("nav-" + name).classList.add("active");
  if (name === "browse") renderBrowse();
  if (name === "scores") renderScores();
  if (name === "detail") renderDetail();
}

// Returns { ok, status, data } instead of throwing, so callers can show
// the real Supabase error message (e.g. an RLS policy rejection) instead
// of a generic failure.
async function supabaseRequest(method, path, data = null) {
  const url = `${SUPABASE_URL}/rest/v1/${path}`;
  const headers = {
    'Content-Type': 'application/json',
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
    'Prefer': 'return=representation'
  };

  const options = { method, headers };
  if (data && method !== 'GET') {
    options.body = JSON.stringify(data);
  }

  const response = await fetch(url, options);
  let body = null;
  try { body = await response.json(); } catch (e) { /* empty body */ }

  if (!response.ok) {
    const message = (body && (body.message || body.hint || body.error)) || `HTTP ${response.status}`;
    return { ok: false, status: response.status, data: body, error: message };
  }
  return { ok: true, status: response.status, data: body };
}

async function loadReviews() {
  const result = await supabaseRequest('GET', `${SUPABASE_TABLE}?order=timestamp.desc`);
  if (!result.ok) {
    console.error('Failed to load reviews:', result.error);
    reviews = [];
    return;
  }
  reviews = result.data || [];
}

function getReviewsForYear(year) {
  return reviews.filter(r => r.year == year);
}

function computeConferenceScores(year) {
  const yearReviews = getReviewsForYear(year);
  const groups = {};
  yearReviews.forEach(r => {
    if (!groups[r.conference]) groups[r.conference] = { conference: r.conference, sums: [0,0,0,0,0], count: 0 };
    const g = groups[r.conference];
    g.sums[0] += r.q1; g.sums[1] += r.q2; g.sums[2] += r.q3; g.sums[3] += r.q4; g.sums[4] += r.q5;
    g.count++;
  });
  return Object.values(groups).map(g => {
    const avgs = g.sums.map(s => s / g.count);
    const overall = avgs.reduce((a, b) => a + b, 0) / 5;
    return {
      conference: g.conference,
      q1: avgs[0], q2: avgs[1], q3: avgs[2], q4: avgs[3], q5: avgs[4],
      overall: overall,
      count: g.count
    };
  });
}

function escapeHtml(s) {
  const div = document.createElement("div");
  div.textContent = s;
  return div.innerHTML;
}

async function renderBrowse() {
  const conf = document.getElementById("b-conference").value;
  const year = document.getElementById("b-year").value;
  const container = document.getElementById("browse-results");

  const filtered = reviews.filter(r =>
    (!conf || r.conference === conf) && (!year || r.year == year)
  );

  if (filtered.length === 0) {
    container.innerHTML = "<p>No reviews found.</p>";
    return;
  }

  container.innerHTML = filtered.map(r => {
    const overall = ((r.q1 + r.q2 + r.q3 + r.q4 + r.q5) / 5).toFixed(1);
    const preview = r.comments ? r.comments.slice(0, 150) + (r.comments.length > 150 ? "..." : "") : "(no comments)";
    return `<div class="review-item">
      <strong>${escapeHtml(r.conference)} ${escapeHtml(String(r.year))}</strong> — Paper ID: ${escapeHtml(r.paperId)}<br>
      Scores: Q1=${r.q1} Q2=${r.q2} Q3=${r.q3} Q4=${r.q4} Q5=${r.q5} (Overall: ${overall})<br>
      Comments: ${escapeHtml(preview)}
    </div>`;
  }).join("");
}

function renderScores() {
  const year = document.getElementById("s-year").value;
  let data = computeConferenceScores(year);
  data.sort((a, b) => {
    if (scoresSortKey === 'conference') {
      return scoresSortDir * a.conference.localeCompare(b.conference);
    }
    return scoresSortDir * -1 * (b[scoresSortKey] - a[scoresSortKey]);
  });
  const tbody = document.getElementById("scores-tbody");
  if (data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8">No reviews for this year.</td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(d => `
    <tr>
      <td><a onclick="goToDetail('${escapeHtml(d.conference)}', '${year}')" style="cursor:pointer;text-decoration:underline;">${escapeHtml(d.conference)}</a></td>
      <td>${d.q1.toFixed(2)}</td>
      <td>${d.q2.toFixed(2)}</td>
      <td>${d.q3.toFixed(2)}</td>
      <td>${d.q4.toFixed(2)}</td>
      <td>${d.q5.toFixed(2)}</td>
      <td>${d.overall.toFixed(2)}</td>
      <td>${d.count}</td>
    </tr>
  `).join("");
}

function sortScores(key) {
  if (scoresSortKey === key) {
    scoresSortDir *= -1;
  } else {
    scoresSortKey = key;
    scoresSortDir = -1;
  }
  renderScores();
}

function goToDetail(conference, year) {
  document.getElementById("d-conference").value = conference;
  document.getElementById("d-year").value = year;
  showPage("detail");
}

function renderDetail() {
  const conf = document.getElementById("d-conference").value;
  const year = document.getElementById("d-year").value;
  const container = document.getElementById("detail-results");

  const allScores = computeConferenceScores(year);
  const thisConf = allScores.find(s => s.conference === conf);

  if (!thisConf) {
    container.innerHTML = "<p>No reviews found for this conference/year.</p>";
    return;
  }

  const ranked = allScores.slice().sort((a, b) => b.overall - a.overall);
  const rank = ranked.findIndex(s => s.conference === conf) + 1;

  container.innerHTML = `
    <div class="rank-box">
      <strong>${escapeHtml(conf)} ${escapeHtml(String(year))}</strong><br>
      Average Overall Rating: ${thisConf.overall.toFixed(2)} / 5<br>
      Rank: ${rank} of ${ranked.length} conferences<br>
      Based on ${thisConf.count} review(s)<br>
      <hr>
      Q1 avg: ${thisConf.q1.toFixed(2)}<br>
      Q2 avg: ${thisConf.q2.toFixed(2)}<br>
      Q3 avg: ${thisConf.q3.toFixed(2)}<br>
      Q4 avg: ${thisConf.q4.toFixed(2)}<br>
      Q5 avg: ${thisConf.q5.toFixed(2)}<br>
    </div>
  `;
}

document.getElementById("reviewForm").addEventListener("submit", async function (e) {
  e.preventDefault();
  const conference = document.getElementById("f-conference").value;
  const year = document.getElementById("f-year").value;
  const paperId = document.getElementById("f-paperid").value.trim();
  const msg = document.getElementById("submit-msg");

  if (!conference || !year || !paperId) {
    msg.textContent = "Please fill in conference, year, and paper ID.";
    msg.className = "error";
    return;
  }

  const review = {
    conference: conference,
    year: parseInt(year),
    paperId: paperId,
    q1: parseInt(document.getElementById("f-q1").value),
    q2: parseInt(document.getElementById("f-q2").value),
    q3: parseInt(document.getElementById("f-q3").value),
    q4: parseInt(document.getElementById("f-q4").value),
    q5: parseInt(document.getElementById("f-q5").value),
    comments: document.getElementById("f-comments").value.trim(),
    timestamp: Date.now()
  };

  msg.textContent = "Submitting...";
  msg.className = "";

  const result = await supabaseRequest('POST', SUPABASE_TABLE, review);

  if (!result.ok) {
    // Surface the actual Supabase error (e.g. RLS policy violation, missing
    // column, type mismatch) instead of a generic message.
    msg.textContent = "Error saving review: " + result.error;
    msg.className = "error";
    console.error('Supabase insert failed:', result);
    return;
  }

  msg.textContent = "Review submitted. Thanks!";
  msg.className = "";
  document.getElementById("reviewForm").reset();

  const saved = (result.data && result.data[0]) || review;
  reviews.unshift(saved);
});

(async function init() {
  initSelects();
  await loadReviews();
  renderBrowse();
  renderScores();
})();
</script>

</body>
</html>
